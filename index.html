<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>情報Ⅰ 期末範囲 赤シート</title>
  <style>
    html,body{height:100%;margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;background:#eef1f0;color:#1d2726}
    .loading{height:100%;display:grid;place-items:center;text-align:center;padding:24px}
    .box{background:#fff;border-radius:12px;padding:24px;box-shadow:0 4px 18px rgba(0,0,0,.08);max-width:360px}
    .spinner{width:36px;height:36px;margin:0 auto 14px;border:4px solid #d8e8e6;border-top-color:#00857c;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .error{color:#a22}
  </style>
</head>
<body>
  <div class="loading"><div class="box"><div class="spinner"></div><b>教材を読み込んでいます</b><p>数秒お待ちください。</p></div></div>
  <script>
    const parts = Array.from({length:8},(_,i)=>`site/part${String(i+1).padStart(2,'0')}.txt`);
    Promise.all(parts.map(path=>fetch(path,{cache:'no-store'}).then(r=>{
      if(!r.ok) throw new Error(`${path}: ${r.status}`);
      return r.text();
    }))).then(chunks=>{
      document.open();
      document.write(chunks.join(''));
      document.close();
    }).catch(err=>{
      document.body.innerHTML='<div class="loading"><div class="box error"><b>読み込みに失敗しました</b><p>ページを再読み込みしてください。</p><small>'+String(err)+'</small></div></div>';
    });
  </script>
</body>
</html>
